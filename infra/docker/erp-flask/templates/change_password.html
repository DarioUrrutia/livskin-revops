<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Livskin ERP — Cambiar contraseña</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e8ecf3 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
            padding: 1rem;
        }
        .container {
            background: #fff;
            padding: 2.5rem 2rem;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 460px;
        }
        h1 { font-size: 1.4rem; margin-bottom: 0.4rem; color: #1a1a1a; }
        .subtitle { color: #666; font-size: 0.9rem; margin-bottom: 1.5rem; }
        .requirements {
            background: #f8f9fb;
            border: 1px solid #e1e5eb;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.82rem;
            color: #555;
            margin-bottom: 1.25rem;
        }
        .requirements ul { margin-left: 1.1rem; margin-top: 0.3rem; }
        .field { margin-bottom: 1rem; }
        label {
            display: block;
            font-size: 0.85rem;
            color: #444;
            margin-bottom: 0.4rem;
            font-weight: 500;
        }
        input[type="password"] {
            width: 100%;
            padding: 0.65rem 0.85rem;
            border: 1.5px solid #d8dde3;
            border-radius: 8px;
            font-size: 1rem;
        }
        input[type="password"]:focus { outline: none; border-color: #4a6cf7; }
        button {
            width: 100%;
            background: #1a1a1a;
            color: #fff;
            border: none;
            padding: 0.75rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            margin-top: 0.5rem;
        }
        button:hover { background: #2a2a2a; }
        .error {
            background: #fef2f2;
            color: #b91c1c;
            padding: 0.65rem 0.85rem;
            border-radius: 8px;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            border: 1px solid #fecaca;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Cambiar contraseña</h1>
        <p class="subtitle">{% if forced %}Por seguridad debes cambiar tu contraseña inicial.{% else %}Actualiza tu contraseña actual.{% endif %}</p>

        <div class="requirements">
            <strong>Requisitos:</strong>
            <ul>
                <li>Mínimo 12 caracteres</li>
                <li>Al menos una mayúscula, una minúscula y un número</li>
            </ul>
        </div>

        {% if error %}<div class="error">{{ error }}</div>{% endif %}

        <form method="POST" action="{{ url_for('auth.change_password_post') }}">
            <div class="field">
                <label for="current_password">Contraseña actual</label>
                <input type="password" id="current_password" name="current_password" required autofocus>
            </div>
            <div class="field">
                <label for="new_password">Nueva contraseña</label>
                <input type="password" id="new_password" name="new_password" required minlength="12">
            </div>
            <div class="field">
                <label for="confirm_password">Confirmar nueva contraseña</label>
                <input type="password" id="confirm_password" name="confirm_password" required minlength="12">
            </div>
            <button type="submit">Cambiar contraseña</button>
        </form>
    </div>
</body>
</html>

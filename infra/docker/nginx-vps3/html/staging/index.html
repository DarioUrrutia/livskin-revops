<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Livskin · ERP Staging</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #fff7ed;
            color: #1a1a1a;
            line-height: 1.5;
        }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .staging-banner {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: #f97316;
            color: white;
            text-align: center;
            padding: 0.5rem;
            font-size: 0.875rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
        .card {
            max-width: 480px;
            padding: 3rem 2.5rem;
            background: #ffffff;
            border: 2px solid #f97316;
            border-radius: 8px;
            text-align: center;
        }
        .brand {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: #1a1a1a;
            margin-bottom: 0.25rem;
        }
        .tag {
            display: inline-block;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #ea580c;
            margin-bottom: 2rem;
        }
        h1 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #333;
        }
        p {
            font-size: 0.95rem;
            color: #666;
            margin-bottom: 0.75rem;
        }
        .status {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid #efefef;
            font-size: 0.75rem;
            color: #999;
        }
        .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #f97316;
            margin-right: 0.5rem;
            vertical-align: middle;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
    </style>
</head>
<body>
    <div class="staging-banner">⚠️ Staging — ambiente de pruebas, datos no reales</div>
    <div class="card">
        <div class="brand">Livskin</div>
        <div class="tag">ERP · Staging</div>
        <h1>En construcción</h1>
        <p>Este es el ambiente de staging del ERP.</p>
        <p>No usar para operaciones reales.</p>
        <div class="status"><span class="dot"></span>Staging activo · TLS válido</div>
    </div>
</body>
</html>

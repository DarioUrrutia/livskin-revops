<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Livskin · ERP</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #fafafa;
            color: #1a1a1a;
            line-height: 1.5;
        }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .card {
            max-width: 480px;
            padding: 3rem 2.5rem;
            background: #ffffff;
            border: 1px solid #e5e5e5;
            border-radius: 8px;
            text-align: center;
        }
        .brand {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: #1a1a1a;
            margin-bottom: 0.25rem;
        }
        .tag {
            display: inline-block;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #666;
            margin-bottom: 2rem;
        }
        h1 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #333;
        }
        p {
            font-size: 0.95rem;
            color: #666;
            margin-bottom: 0.75rem;
        }
        .status {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid #efefef;
            font-size: 0.75rem;
            color: #999;
        }
        .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
            margin-right: 0.5rem;
            vertical-align: middle;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
    </style>
</head>
<body>
    <div class="card">
        <div class="brand">Livskin</div>
        <div class="tag">ERP · Production</div>
        <h1>En construcción</h1>
        <p>El sistema ERP está siendo configurado.</p>
        <p>Disponibilidad próxima — gracias por tu paciencia.</p>
        <div class="status"><span class="dot"></span>Infraestructura activa · TLS válido · CI/CD online</div>
    </div>
</body>
</html>

# erp.livskin.site — ERP productivo
# Por ahora sirve maintenance page. En Fase 2 se cambia a proxy_pass al container erp-flask.

# Redirect HTTP -> HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name erp.livskin.site;
    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name erp.livskin.site;

    ssl_certificate /etc/nginx/certs/livskin-origin.crt;
    ssl_certificate_key /etc/nginx/certs/livskin-origin.key;

    # Security headers (ADR-0003 baseline)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    root /var/www/prod;
    index index.html;

    # Health endpoint local (no se ve desde internet salvo via HTTPS directo)
    location = /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

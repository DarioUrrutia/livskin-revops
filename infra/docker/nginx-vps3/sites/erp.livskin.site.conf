# erp.livskin.site — ERP productivo (Fase 2: dormant standby)
# Hace proxy_pass al container erp-flask en data_net.
# Estado actual: ERP refactorizado funcional pero NO se usa en producción
# todavía — Render sigue siendo producción. Cutover a este endpoint en
# Fase 6 per ADR-0024.

# Redirect HTTP -> HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name erp.livskin.site;
    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name erp.livskin.site;

    ssl_certificate /etc/nginx/certs/livskin-origin.crt;
    ssl_certificate_key /etc/nginx/certs/livskin-origin.key;

    # Security headers (ADR-0003 baseline)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Tamaño máximo para uploads (forms con muchos items)
    client_max_body_size 4m;

    # Health del propio nginx
    location = /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Proxy todo al container erp-flask (puerto 8000 interno)
    location / {
        proxy_pass http://erp-flask:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # Timeouts razonables
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # Buffer config (templates ~180KB)
        proxy_buffering on;
        proxy_buffers 16 16k;
        proxy_buffer_size 32k;
    }
}

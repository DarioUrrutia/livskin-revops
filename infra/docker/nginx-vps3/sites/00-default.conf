# Default server — atrapa cualquier request a host desconocido (ej: direct IP access).
# Retorna 444 (connection close sin respuesta HTTP) — silencia bots de escaneo.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 444;
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    http2 on;
    server_name _;

    # Cert necesario para que la conexión SSL funcione; usa el wildcard livskin
    ssl_certificate /etc/nginx/certs/livskin-origin.crt;
    ssl_certificate_key /etc/nginx/certs/livskin-origin.key;

    return 444;
}

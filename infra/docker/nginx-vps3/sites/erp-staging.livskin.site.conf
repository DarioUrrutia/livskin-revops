# erp-staging.livskin.site — ERP en staging (ambiente de pruebas)
# Misma estructura que erp.livskin.site pero con maintenance page diferente.
# En Fase 1-2 se usa para validar cambios antes de producción.

# Redirect HTTP -> HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name erp-staging.livskin.site;
    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name erp-staging.livskin.site;

    ssl_certificate /etc/nginx/certs/livskin-origin.crt;
    ssl_certificate_key /etc/nginx/certs/livskin-origin.key;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Anti-indexing: staging no debe aparecer en Google
    add_header X-Robots-Tag "noindex, nofollow, noarchive" always;

    root /var/www/staging;
    index index.html;

    location = /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

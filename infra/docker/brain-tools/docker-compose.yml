# brain-tools — indexer + query CLI para el segundo cerebro.
# Container one-shot (profile "oneshot"), no se levanta con up -d.
#
# Uso:
#   docker compose run --rm brain-tools index                   # indexa todo el repo
#   docker compose run --rm brain-tools query "pregunta"       # busca semanticamente
#   docker compose run --rm brain-tools query "pregunta" 10    # top 10 resultados

services:
  brain-tools:
    build:
      context: .
    image: livskin/brain-tools:latest
    container_name: brain-tools
    env_file:
      - ../postgres-data/.env
    environment:
      # DATABASE_URL se construye en Python desde BRAIN_USER_PASSWORD
      # (env_file lo pasa al container). No interpolamos aqui porque
      # docker-compose leeria de shell env, no de env_file.
      BRAIN_DB_HOST: postgres-data
      BRAIN_DB_NAME: livskin_brain
      EMBED_URL: http://embeddings-service:8000/embed
    volumes:
      # Mount read-only del repo completo para que el indexer lea .md
      # Path en VPS 3 donde vive el git clone (ver CI/CD)
      - /srv/livskin-revops:/repo:ro
    networks:
      - data_net
    profiles: [oneshot]

networks:
  data_net:
    external: true
    name: data_net

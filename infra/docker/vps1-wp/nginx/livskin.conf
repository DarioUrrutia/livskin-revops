# /etc/nginx/sites-available/livskin
#
# Hosts livskin.site (WordPress).
# TLS managed by Certbot (auto-renew via cron).
# PHP via php8.1-fpm socket.
#
# CI/CD path: deploy-vps1.yml hace rsync de este archivo y reload nginx.

server {
    server_name livskin.site www.livskin.site;

    # Hardening básico
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    root /var/www/livskin;
    index index.php index.html index.htm;

    # Bloquear acceso directo a wp-config (defensa-en-profundidad)
    location = /wp-config.php {
        deny all;
    }

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/var/run/php/php8.1-fpm.sock;
    }

    # Bloquear ejecución PHP en uploads (prevención de webshells)
    location ~* /wp-content/uploads/.*\.php$ {
        deny all;
    }

    # Bloquear archivos .ht*
    location ~ /\.ht {
        deny all;
    }

    # SSL managed by Certbot
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/livskin.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/livskin.site/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = www.livskin.site) {
        return 301 https://$host$request_uri;
    }

    if ($host = livskin.site) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    server_name livskin.site www.livskin.site;
    return 404;
}

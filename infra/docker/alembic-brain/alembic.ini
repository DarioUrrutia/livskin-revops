# Alembic config para livskin_brain
# La URL de conexion se construye en migrations/env.py desde env vars
# (POSTGRES_SUPERUSER_PASSWORD + ALEMBIC_DB_NAME + ALEMBIC_DB_HOST).

[alembic]
script_location = migrations

# Formato nombre archivo: fecha + rev corta + slug
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# Timezone para Create Date
timezone = UTC

# sqlalchemy.url se setea dinamicamente en env.py (NO hardcodear aqui)

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

services:
  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    restart: always
    environment:
      - MB_DB_TYPE=postgres
      - MB_DB_DBNAME=metabase
      - MB_DB_PORT=5432
      - MB_DB_USER=analytics_user
      - MB_DB_PASS=livskin
      - MB_DB_HOST=postgres-analytics
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - revops_net

networks:
  revops_net:
    external: true

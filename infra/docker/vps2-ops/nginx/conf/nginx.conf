# nginx.conf de VPS 2 — versión idéntica a la actual en producción.
# La hardening con default_server return 444 (rechazar hosts desconocidos)
# se agregará en sub-bloque post-Bloque-0 después de validar que no rompe
# nada. Por ahora preservar comportamiento existente.

events {}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    include /etc/nginx/sites/*.conf;
}

# Nginx — reverse proxy de VPS 2
#
# Termina TLS con Cloudflare Origin Cert wildcard *.livskin.site
# para los 3 subdominios de VPS 2:
# - flow.livskin.site → n8n:5678
# - crm.livskin.site → vtiger:80
# - dash.livskin.site → metabase:3000
#
# Los certs viven en ./certs/ (gitignored — copiados desde Bitwarden o
# cross-VPS sync con VPS 3 que tiene los mismos certs wildcard).

services:
  nginx:
    image: nginx:stable
    container_name: nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./conf/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./sites:/etc/nginx/sites:ro
      - ./logs:/var/log/nginx
      - ./certs:/etc/nginx/certs:ro
    networks:
      - revops_net
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  revops_net:
    external: true

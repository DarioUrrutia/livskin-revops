# n8n — orquestador de workflows (ADR-0005)
#
# Sirve flow.livskin.site (vía nginx-vps2 con TLS).
# Webhooks recibidos: SureForms POST, WhatsApp Cloud API (Fase 4).
#
# Volumen: ./data/ contiene database.sqlite + workflows + credentials.
# Backup: tarball nightly de ./data/ (cross-VPS).
#
# Env vars secretas (Vtiger API, ERP audit, etc.): vienen de ./.env
# (gitignored — copiar desde keys/.env.integrations en setup inicial).
# Ver infra/n8n/conventions.md § 9 para política de credenciales.

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: always

    # env_file: secretos sensibles (Vtiger access key, ERP audit token, etc.)
    # Estructura del archivo en .env.example
    env_file:
      - .env

    environment:
      # n8n-specific (con defaults)
      - N8N_HOST=${N8N_HOST:-flow.livskin.site}
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=${N8N_WEBHOOK_URL:-https://flow.livskin.site}
      # Habilitar autenticación basic en futuro:
      # - N8N_BASIC_AUTH_ACTIVE=true
      # - N8N_BASIC_AUTH_USER=${N8N_BASIC_USER}
      # - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_PASS}

    volumes:
      - ./data:/home/node/.n8n

    networks:
      - revops_net

networks:
  revops_net:
    external: true

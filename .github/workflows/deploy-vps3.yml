name: Deploy to VPS 3 (livskin-vps-erp)

# VPS 3 hosts: ERP refactorizado + Postgres + pgvector (brain) + embeddings + nginx
# Path: /srv/livskin-revops/infra/docker/<servicio>/ (paths legacy — ver
# infra/docker/README.md sobre asimetria intencional con vps2-ops/)

on:
  push:
    branches: [main]
    paths:
      - 'infra/docker/erp-flask/**'
      - 'infra/docker/postgres-data/**'
      - 'infra/docker/embeddings-service/**'
      - 'infra/docker/nginx-vps3/**'
      - 'infra/docker/alembic-erp/**'
      - 'infra/docker/alembic-brain/**'
      - 'infra/docker/brain-tools/**'
      - '.github/workflows/deploy-vps3.yml'
      - '.github/scripts/**'
  workflow_dispatch:
    inputs:
      skip_snapshot:
        description: 'Skip pre-deploy snapshot DO (USE CON CUIDADO)'
        type: boolean
        default: false
      skip_tests:
        description: 'Skip pytest post-deploy'
        type: boolean
        default: false

# Evita 2 deploys simultaneos del mismo branch
concurrency:
  group: deploy-vps3-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Snapshot + Pull + Compose + Tests
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install doctl
        run: bash .github/scripts/install-doctl.sh

      - name: Setup SSH
        env:
          SSH_KEY: ${{ secrets.VPS3_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS3_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keygen -l -f ~/.ssh/deploy_key
          ssh-keyscan -H "$VPS_HOST" > ~/.ssh/known_hosts 2>/dev/null
          if [ ! -s ~/.ssh/known_hosts ]; then
            echo "ERROR: ssh-keyscan no produjo entradas"
            exit 1
          fi

      - name: DO API auth
        env:
          DO_API_TOKEN: ${{ secrets.DO_API_TOKEN }}
        run: |
          # Strip whitespace/newlines del token (paste-from-clipboard puede agregar \n)
          TOKEN=$(printf '%s' "$DO_API_TOKEN" | tr -d '[:space:]')
          [ -z "$TOKEN" ] && { echo "ERROR: DO_API_TOKEN vacio"; exit 1; }
          doctl auth init --access-token "$TOKEN"
          doctl account get | head -3

      - name: Pre-deploy snapshot
        if: ${{ inputs.skip_snapshot != true }}
        id: snapshot
        run: |
          SNAP_ID=$(bash .github/scripts/do-snapshot.sh create livskin-vps-erp pre-deploy)
          echo "snapshot_id=$SNAP_ID" >> "$GITHUB_OUTPUT"
          echo "Snapshot pre-deploy creado: $SNAP_ID"

      - name: Deploy to VPS 3
        env:
          RAW_HOST: ${{ secrets.VPS3_HOST }}
          RAW_USER: ${{ secrets.VPS3_USER }}
        run: |
          TARGET_HOST=$(printf '%s' "$RAW_HOST" | tr -d '[:space:]')
          TARGET_USER=$(printf '%s' "$RAW_USER" | tr -d '[:space:]')
          echo "Lengths: user=${#TARGET_USER} host=${#TARGET_HOST}"
          if [ -z "$TARGET_USER" ] || [ -z "$TARGET_HOST" ]; then
            echo "ERROR: TARGET_USER or TARGET_HOST empty after strip"
            exit 1
          fi
          ssh -i ~/.ssh/deploy_key -o BatchMode=yes "${TARGET_USER}@${TARGET_HOST}" 'bash -s' <<'ENDSSH'
          set -e
          echo "=== Git pull ==="
          cd /srv/livskin-revops
          git pull origin main
          echo

          echo "=== Long-running services (postgres + embeddings + nginx) ==="
          for svc in postgres-data embeddings-service nginx-vps3; do
            compose_file="infra/docker/$svc/docker-compose.yml"
            if [ -f "$compose_file" ]; then
              echo "--- $svc ---"
              docker compose -f "$compose_file" up -d --quiet-pull 2>&1 | tail -5
            else
              echo "SKIP $svc: compose file no encontrado"
            fi
          done
          echo

          echo "=== ERP Flask (rebuild + restart) ==="
          erp_compose="infra/docker/erp-flask/docker-compose.yml"
          if [ -f "$erp_compose" ]; then
            docker compose -f "$erp_compose" up -d --build 2>&1 | tail -10
          else
            echo "SKIP erp-flask: compose file no encontrado"
          fi
          echo

          echo "=== One-shot images rebuild (alembic-erp + brain-tools) ==="
          for svc in alembic-erp brain-tools; do
            compose_file="infra/docker/$svc/docker-compose.yml"
            if [ -f "$compose_file" ]; then
              echo "--- $svc (build only) ---"
              docker compose -f "$compose_file" build 2>&1 | tail -3
            else
              echo "SKIP $svc"
            fi
          done
          echo

          echo "=== nginx reload (config + sites) ==="
          if docker ps --format '{{.Names}}' | grep -q '^nginx-vps3$'; then
            docker exec nginx-vps3 nginx -t 2>&1 | tail -3
            docker exec nginx-vps3 nginx -s reload 2>&1 | tail -3 || true
          fi
          echo

          echo "=== Estado containers ==="
          docker ps --format "table {{.Names}}\t{{.Status}}"
          ENDSSH

      - name: Verify public endpoints
        run: |
          sleep 20
          # Verify usa /ping porque rutas regulares ahora redirigen a /login (auth ADR-0026).
          for url in https://erp.livskin.site/ping; do
            success=false
            for attempt in 1 2 3; do
              if curl -sfI --max-time 10 "$url" > /dev/null; then
                echo "OK: $url (intento $attempt)"
                success=true
                break
              fi
              echo "Intento $attempt fallo, reintentando en 5s..."
              sleep 5
            done
            if [ "$success" = "false" ]; then
              echo "FAIL: $url tras 3 intentos"
              exit 1
            fi
          done
          echo
          echo "Deploy completo y verificado."

      - name: Run pytest in deployed container
        if: ${{ inputs.skip_tests != true }}
        env:
          RAW_HOST: ${{ secrets.VPS3_HOST }}
          RAW_USER: ${{ secrets.VPS3_USER }}
        run: |
          TARGET_HOST=$(printf '%s' "$RAW_HOST" | tr -d '[:space:]')
          TARGET_USER=$(printf '%s' "$RAW_USER" | tr -d '[:space:]')

          # Asegurar DB de tests existe
          ssh -i ~/.ssh/deploy_key -o BatchMode=yes "${TARGET_USER}@${TARGET_HOST}" \
            "docker exec -i postgres-data psql -U postgres -tc \"SELECT 1 FROM pg_database WHERE datname='livskin_erp_test'\" | grep -q 1 || \
             docker exec -i postgres-data psql -U postgres -c 'CREATE DATABASE livskin_erp_test;'"

          # Correr suite con coverage
          ssh -i ~/.ssh/deploy_key -o BatchMode=yes "${TARGET_USER}@${TARGET_HOST}" \
            "docker exec erp-flask pytest /app/tests/ --tb=short"

          echo "Tests pasaron — coverage >=75% verificado por fail_under en pyproject.toml"

      # Rollback automatico si verify o tests fallan
      - name: Rollback on failure
        if: ${{ failure() && steps.snapshot.outputs.snapshot_id != '' }}
        env:
          DO_API_TOKEN: ${{ secrets.DO_API_TOKEN }}
          SNAPSHOT_ID: ${{ steps.snapshot.outputs.snapshot_id }}
        run: |
          echo "=== ROLLBACK AUTOMATICO VPS 3 ==="
          bash .github/scripts/doctl-auth.sh "$DO_API_TOKEN"
          bash .github/scripts/do-snapshot.sh restore livskin-vps-erp "$SNAPSHOT_ID"

      - name: Cleanup old snapshots
        if: success()
        env:
          DO_API_TOKEN: ${{ secrets.DO_API_TOKEN }}
        run: |
          bash .github/scripts/doctl-auth.sh "$DO_API_TOKEN"
          bash .github/scripts/do-snapshot.sh cleanup livskin-vps-erp pre-deploy

      - name: Audit deploy event
        if: always()
        env:
          AUDIT_TOKEN: ${{ secrets.AUDIT_INTERNAL_TOKEN }}
          OUTCOME: ${{ job.status }}
          SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
        run: |
          curl -s -X POST "https://erp.livskin.site/api/internal/audit-event" \
            -H "X-Internal-Token: $AUDIT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"action\":\"infra.deploy_completed\",\"metadata\":{\"vps\":\"vps3\",\"sha\":\"$SHA\",\"actor\":\"$ACTOR\",\"outcome\":\"$OUTCOME\"}}" \
            || echo "WARNING: audit endpoint no respondio"
